<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Dev Blog</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: #f5f5f5;
            line-height: 1.6;
        }

        header {
            background: #222;
            color: #fff;
            padding: 1rem;
            text-align: center;
        }

        nav {
            background: #444;
            padding: 0.5rem;
            text-align: center;
        }

        nav a {
            color: white;
            margin: 0 10px;
            text-decoration: none;
        }

        nav a:hover {
            text-decoration: underline;
        }

        .container {
            width: 90%;
            max-width: 1000px;
            margin: 20px auto;
        }

        .post {
            background: white;
            padding: 20px;
            margin-bottom: 20px;
            border-radius: 8px;
        }

        .post h2 {
            margin-top: 0;
        }

        footer {
            text-align: center;
            padding: 20px;
            background: #222;
            color: white;
            margin-top: 40px;
        }

        .date {
            color: gray;
            font-size: 0.9em;
        }
    </style>
</head>

<body>

<header>
    <h1>🔥 My Dev Blog</h1>
    <p>기록하고 성장하는 개발 블로그</p>
</header>

<nav>
    <a href="#">홈</a>
    <a href="#">소개</a>
    <a href="#">프로젝트</a>
    <a href="#">연락처</a>
</nav>

<div class="container">

    <!-- 게시글 1 -->
    <div class="post">
        <h2>첫 번째 글: 블로그 시작</h2>
        <p class="date">2026-04-18</p>
        <p>
            드디어 블로그를 시작했다.  
            이곳에는 개발하면서 배운 내용, 트러블슈팅, 기록들을 남길 예정이다.
        </p>
    </div>

    <!-- 게시글 2 -->
    <div class="post">
        <h2>Git 정리</h2>
        <p class="date">2026-04-17</p>
        <p>
            오늘은 Git 기본 명령어를 정리했다.  
            commit, push, pull, branch 개념을 다시 복습했다.
        </p>
    </div>

</div>

<footer>
    <p>© 2026 My Dev Blog | GitHub Pages</p>
</footer>

</body>
</html>
